<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f4f4f4;
color:#111;
}


header{
text-align:center;
padding:80px 20px 40px;
background:white;
}

header h1{
font-size:42px;
font-weight:700;
letter-spacing:2px;
}

header p{
margin-top:15px;
color:#777;
font-size:15px;
}

.filters{
display:flex;
justify-content:center;
gap:20px;
margin:40px 0;
flex-wrap:wrap;
}

.filters button{
background:none;
border:1px solid #ccc;
padding:8px 18px;
cursor:pointer;
font-size:14px;
transition:0.3s;
}

.filters button:hover,
.filters button.active{
background:#111;
color:white;
border-color:#111;
}

.gallery{
max-width:1200px;
margin:auto;
padding:0 20px 80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.gallery-item{
position:relative;
overflow:hidden;
cursor:pointer;
background:white;
}

.gallery-item img{
width:100%;
height:350px;
object-fit:cover;
transition:0.5s;
}

.gallery-item:hover img{
transform:scale(1.05);
}

.caption{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,0.7));
color:white;
opacity:0;
transition:0.3s;
}

.gallery-item:hover .caption{
opacity:1;
}

.caption h3{
font-size:18px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
visibility:hidden;
transition:0.4s;
}

.modal.active{
opacity:1;
visibility:visible;
}

.modal img{
max-width:85%;
max-height:75%;
object-fit:contain;
}

.modal h2{
color:white;
margin-top:20px;
font-weight:500;
}

.modal button{
position:absolute;
background:white;
border:none;
padding:10px 14px;
cursor:pointer;
font-size:18px;
}

.close{top:30px; right:40px;}
.prev{left:40px;}
.next{right:40px;}

@media(max-width:768px){
.gallery-item img{
height:250px;
}
header h1{
font-size:28px;
}
}

</style>
</head>
<body>

<header>
<h1>Photography Gallery</h1>
<p>A curated collection of professional photography</p>
</header>

<div class="filters">
<button class="active" onclick="filterImages('all',this)">All</button>
<button onclick="filterImages('nature',this)">Nature</button>
<button onclick="filterImages('city',this)">City</button>
<button onclick="filterImages('animals',this)">Animals</button>
</div>

<div class="gallery" id="gallery">

<div class="gallery-item" data-category="nature" data-title="Mountain Landscape">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=1200">
<div class="caption"><h3>Mountain Landscape</h3></div>
</div>

<div class="gallery-item" data-category="city" data-title="Modern Architecture">
<img src="https://api.gharpedia.com/wp-content/uploads/2019/02/Heydar-Aliyev-Cultural-Centre-by-Zaha-Hadid-01-0101070001.jpg">
<div class="caption"><h3>Modern Architecture</h3></div>
</div>

<div class="gallery-item" data-category="animals" data-title="Wildlife Portrait">
<img src="https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=1200">
<div class="caption"><h3>Wildlife Portrait</h3></div>
</div>

<div class="gallery-item" data-category="nature" data-title="Ocean View">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200">
<div class="caption"><h3>Ocean View</h3></div>
</div>

<div class="gallery-item" data-category="city" data-title="Urban Night">
<img src="https://rukminim2.flixcart.com/image/480/480/kxrvi4w0/wall-decoration/k/i/y/japan-tokyo-night-urban-wallpaper-poster-1-vp301221-422-poster-original-imaga5gzgxdhutrb.jpeg?q=90">
<div class="caption"><h3>Urban Night</h3></div>
</div>

<div class="gallery-item" data-category="animals" data-title="Tiger Closeup">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQUIg4LLyY8OZrAH3_zvL6uq-sYoRlQhj17PQ&s">
<div class="caption"><h3>Tiger Closeup</h3></div>
</div>

</div>

<div class="modal" id="modal">
<button class="close" onclick="closeModal()">✕</button>
<button class="prev" onclick="changeImage(-1)">❮</button>
<img id="modalImg">
<h2 id="caption"></h2>
<button class="next" onclick="changeImage(1)">❯</button>
</div>

<script>

let currentIndex=0;
let visibleItems=[];
const items=document.querySelectorAll(".gallery-item");
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modalImg");
const caption=document.getElementById("caption");

function updateVisible(){
visibleItems=[...items].filter(item=>item.style.display!=="none");
}

items.forEach((item,index)=>{
item.addEventListener("click",()=>{
updateVisible();
currentIndex=visibleItems.indexOf(item);
showImage();
modal.classList.add("active");
});
});

function showImage(){
modalImg.src=visibleItems[currentIndex].querySelector("img").src;
caption.innerText=visibleItems[currentIndex].dataset.title;
}

function changeImage(dir){
currentIndex+=dir;
if(currentIndex<0) currentIndex=visibleItems.length-1;
if(currentIndex>=visibleItems.length) currentIndex=0;
showImage();
}

function closeModal(){
modal.classList.remove("active");
}

function filterImages(category,btn){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

items.forEach(item=>{
if(category==="all" || item.dataset.category===category){
item.style.display="block";
}else{
item.style.display="none";
}
});
}

document.addEventListener("keydown",e=>{
if(!modal.classList.contains("active")) return;
if(e.key==="ArrowRight") changeImage(1);
if(e.key==="ArrowLeft") changeImage(-1);
if(e.key==="Escape") closeModal();
});

</script>

</body>
</html>
